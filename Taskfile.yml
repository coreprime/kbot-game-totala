version: '3'

dotenv: ['.env.local', '.env']

tasks:
  default:
    desc: Full quality gate — Go (fmt/vet/build/test/lint) plus the JS lint and contract tests
    cmds:
      - task: deps
      - task: fmt-check
      - task: vet
      - task: build
      - task: test
      - task: lint
      - task: js

  # ---- Go ----
  # This module is a single root package; npm drops a vendored Go file under
  # node_modules, so the Go tooling is scoped to the module root (not ./...) to
  # keep node_modules out of the build/lint set.
  deps:
    desc: Download Go module dependencies
    cmds:
      - go mod download

  fmt:
    desc: Format all Go sources with gofmt
    cmds:
      - gofmt -w $(git ls-files '*.go')

  fmt-check:
    desc: Verify every Go source is gofmt-clean
    cmds:
      - |
        out="$(gofmt -l $(git ls-files '*.go'))"
        if [ -n "$out" ]; then
          echo "The following files are not gofmt-clean:"
          echo "$out"
          exit 1
        fi

  vet:
    desc: Run go vet
    cmds:
      - go vet .

  build:
    desc: Build the Go package
    cmds:
      - go build .

  test:
    desc: Run the Go tests (asset-gated tests skip cleanly)
    env:
      ALLOW_SKIP_ASSETS: 'true'
    cmds:
      - go test .

  lint:
    desc: Run golangci-lint (pinned to the CI version, assumed installed)
    cmds:
      - golangci-lint run .

  # ---- JS ----
  js:
    desc: JS gate — install deps and run the eslint + contract-test check
    cmds:
      - npm ci
      - npm run check
